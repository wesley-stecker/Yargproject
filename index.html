<style>
  :root {
    --bg: #0d0d1a;

    --surface2: #1a1a2e;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #ffffff;
    --text-dim: #aaaacc;
    --text-muted: #666688;
    --genre-color: #88aaff;
    --border: #1e1e3a;
    --gold: #ffd700;
    --row-hover: #1e1e40;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  header {
    background: var(--surface2);
    border-bottom: 2px solid var(--accent);
    padding: 1.5rem 2rem 1rem;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem; }
  .logo { display: flex; align-items: center; gap: 0.75rem; }
  .logo-icon { font-size: 1.8rem; }
  .logo h1 { font-size: 1.4rem; font-weight: 700; color: var(--gold); letter-spacing: -0.5px; }
  .logo p { font-size: 0.75rem; color: var(--text-dim); margin-top: 1px; }
  .song-count { background: var(--accent); color: #fff; font-size: 0.75rem; font-weight: 700; padding: 4px 12px; border-radius: 999px; white-space: nowrap; }

  .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 220px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem; pointer-events: none; }
  input[type=search] {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 0.9rem; padding: 0.55rem 0.75rem 0.55rem 2.2rem;
    outline: none; transition: border-color 0.2s;
  }
  input[type=search]:focus { border-color: var(--accent); }
  input[type=search]::placeholder { color: var(--text-muted); }
  select {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 0.9rem; padding: 0.55rem 0.75rem; outline: none;
    cursor: pointer; transition: border-color 0.2s; min-width: 140px;
  }
  select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  .results-bar {
    padding: 0.5rem 2rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .results-bar span { color: var(--accent); font-weight: 600; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 640px; }
  thead tr { background: var(--accent2); }
  th {
    padding: 0.65rem 1rem; text-align: left; font-size: 0.78rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim);
    cursor: pointer; user-select: none; white-space: nowrap;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 0;
  }
  th:hover { color: var(--text); }
  th.sorted { color: var(--accent); }
  th .sort-arrow { margin-left: 4px; opacity: 0.5; }
  th.sorted .sort-arrow { opacity: 1; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:nth-child(even) { background: var(--surface); }
  tbody tr:nth-child(odd) { background: var(--bg); }
  tbody tr:hover { background: var(--row-hover); }
  td { padding: 0.6rem 1rem; font-size: 0.88rem; vertical-align: middle; }
  .td-song { font-weight: 500; color: var(--text); max-width: 260px; }
  .td-artist { color: var(--text); max-width: 200px; }
  .td-album { color: var(--text-dim); font-size: 0.82rem; max-width: 200px; }
  .td-genre { color: var(--genre-color); font-size: 0.8rem; white-space: nowrap; }
  .td-year { color: var(--text-muted); font-size: 0.8rem; text-align: center; }
  .td-charter { color: var(--text-muted); font-size: 0.78rem; text-align: center; }
  .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

  .empty-state {
    text-align: center; padding: 4rem 2rem; color: var(--text-muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 1rem; }

  footer {
    text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.78rem;
    border-top: 1px solid var(--border); margin-top: 1rem;
  }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    .controls { flex-direction: column; }
    td, th { padding: 0.5rem 0.6rem; }
    .td-album, .td-charter { display: none; }
  }
</style>
</head>

const tbody = document.getElementById('tbody');
const searchEl = document.getElementById('search');
const genreEl = document.getElementById('genre-filter');
const yearEl = document.getElementById('year-filter');
const sortEl = document.getElementById('sort-select');
const countEl = document.getElementById('result-count');
const badgeEl = document.getElementById('count-badge');
const emptyEl = document.getElementById('empty');

// Populate year filter
const years = [...new Set(ALL_SONGS.map(s => s.year))].filter(Boolean).sort((a,b)=>b-a);
years.forEach(y => {
  const o = document.createElement('option');
  o.value = y; o.textContent = y;
  yearEl.appendChild(o);
});

let sortCol = 'artist', sortDir = 1;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  const q = searchEl.value.toLowerCase().trim();
  const genre = genreEl.value;
  const year = yearEl.value;

  let filtered = ALL_SONGS.filter(s => {
    if (genre && s.genre !== genre) return false;
    if (year && s.year !== year) return false;
    if (q) {
      const hay = (s.song + ' ' + s.artist + ' ' + s.album).toLowerCase();
      return q.split(' ').every(word => hay.includes(word));
    }
    return true;
  });

  filtered.sort((a, b) => {
    const av = (a[sortCol] || '').toLowerCase();
    const bv = (b[sortCol] || '').toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  countEl.textContent = filtered.length.toLocaleString();
  badgeEl.textContent = filtered.length.toLocaleString() + ' songs';

  document.querySelectorAll('th').forEach(th => {
    th.classList.toggle('sorted', th.dataset.col === sortCol);
    if (th.dataset.col === sortCol) {
      th.querySelector('.sort-arrow').textContent = sortDir === 1 ? '↑' : '↓';
    } else {
      th.querySelector('.sort-arrow').textContent = '↕';
    }
  });

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  const CHUNK = 200;
  const slice = filtered.slice(0, CHUNK);
  tbody.innerHTML = slice.map(s => `
    <tr>
      <td class="td-song"><span class="truncate" title="${esc(s.song)}">${esc(s.song)}</span></td>
      <td class="td-artist"><span class="truncate" title="${esc(s.artist)}">${esc(s.artist)}</span></td>
      <td class="td-album"><span class="truncate" title="${esc(s.album)}">${esc(s.album)}</span></td>
      <td class="td-genre">${esc(s.genre)}</td>
      <td class="td-year">${esc(s.year)}</td>
      <td class="td-charter">${esc(s.charter)}</td>
    </tr>`).join('');

  if (filtered.length > CHUNK) {
    const more = document.createElement('tr');
    more.innerHTML = `<td colspan="6" style="text-align:center;padding:1rem;color:var(--text-muted);font-size:0.82rem;">
      Showing first ${CHUNK} of ${filtered.length.toLocaleString()} results — narrow your search to see more
    </td>`;
    tbody.appendChild(more);
  }
}

searchEl.addEventListener('input', render);
genreEl.addEventListener('change', render);
yearEl.addEventListener('change', render);
sortEl.addEventListener('change', e => { sortCol = e.target.value; render(); });

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    if (sortCol === th.dataset.col) sortDir *= -1;
    else { sortCol = th.dataset.col; sortDir = 1; }
    sortEl.value = sortCol;
    render();
  });
});

render();
</script>
